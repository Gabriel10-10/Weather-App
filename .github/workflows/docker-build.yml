name: Build and Push Weather App

on:
  pull_request:
    branches:
      - main
    paths:
      - 'weather-app/**'
  push:
    branches:
      - main
    paths:
      - 'weather-app/**'

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name cst8918group2acr

      - name: Build and Push Docker Image
        working-directory: weather-app
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t cst8918group2acr.azurecr.io/weather-app:${IMAGE_TAG} .
          docker push cst8918group2acr.azurecr.io/weather-app:${IMAGE_TAG}
